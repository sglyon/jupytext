# Publish jupytext-rs to PyPI via maturin
# Builds wheels for Linux, macOS, and Windows, then publishes using trusted publishing (OIDC).
#
# PyPI setup required:
# 1. Create the `jupytext-rs` project on PyPI
# 2. Configure trusted publishing for this repo + workflow

name: Release (PyPI)

permissions:
  contents: read
  id-token: write  # Required for trusted publishing (OIDC)

on:
  push:
    tags:
      - 'v*'

jobs:
  build-wheels:
    name: "wheel (${{ matrix.os }} / ${{ matrix.target }})"
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64
            manylinux: auto
          # Linux aarch64
          - os: ubuntu-latest
            target: aarch64
            manylinux: auto
          # macOS x86_64
          - os: macos-14
            target: x86_64
          # macOS aarch64 (Apple Silicon)
          - os: macos-14
            target: aarch64
          # Windows x64
          - os: windows-latest
            target: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || 'auto' }}
          args: --release --out dist
          working-directory: pypi
          sccache: 'true'

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}-${{ matrix.target }}
          path: pypi/dist/*.whl

  build-sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: pypi

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: pypi/dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    # Only publish on non-prerelease tags
    if: ${{ !contains(github.ref_name, '-rc') && !contains(github.ref_name, '-beta') && !contains(github.ref_name, '-alpha') }}
    environment:
      name: pypi
      url: https://pypi.org/p/jupytext-rs
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: '{wheel-*,sdist}'
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
