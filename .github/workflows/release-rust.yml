# Publish Rust binaries as GitHub Releases
# Builds prebuilt binaries for multiple platforms and creates a GitHub Release.
#
# NOTE: Requires creating the `sglyon/homebrew-tap` repo on GitHub (can be empty)
# and adding an SSH deploy key as the HOMEBREW_TAP_DEPLOY_KEY secret.

name: Release (Rust binaries)

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: "build (${{ matrix.target }})"
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-pc-windows-msvc
            os: windows-2022
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/jupytext dist/
          cd dist
          tar czf jupytext-${{ github.ref_name }}-${{ matrix.target }}.tar.gz jupytext
          rm jupytext

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target/${{ matrix.target }}/release/jupytext.exe" "dist/"
          Compress-Archive -Path "dist/jupytext.exe" -DestinationPath "dist/jupytext-${{ github.ref_name }}-${{ matrix.target }}.zip"
          Remove-Item "dist/jupytext.exe"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          files: dist/*
          generate_release_notes: true

  publish-homebrew:
    needs: [build, release]
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref_name, '-rc') && !contains(github.ref_name, '-beta') && !contains(github.ref_name, '-alpha') }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true

      - name: Generate Homebrew formula
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"

          SHA_X86=$(sha256sum dist/jupytext-${TAG}-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)
          SHA_ARM=$(sha256sum dist/jupytext-${TAG}-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)
          SHA_LINUX=$(sha256sum dist/jupytext-${TAG}-x86_64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)

          REPO="https://github.com/sglyon/jupytext/releases/download/${TAG}"

          mkdir -p Formula
          cat > Formula/jupytext.rb <<FORMULA
          class Jupytext < Formula
            desc "Convert Jupyter notebooks to/from text formats"
            homepage "https://github.com/sglyon/jupytext"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "${REPO}/jupytext-${TAG}-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_ARM}"
              else
                url "${REPO}/jupytext-${TAG}-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_X86}"
              end
            end

            on_linux do
              url "${REPO}/jupytext-${TAG}-x86_64-unknown-linux-gnu.tar.gz"
              sha256 "${SHA_LINUX}"
            end

            def install
              bin.install "jupytext"
            end

            test do
              system "#{bin}/jupytext", "--help"
            end
          end
          FORMULA

      - name: Push to Homebrew tap
        uses: cpina/github-action-push-to-another-repository@main
        env:
          SSH_DEPLOY_KEY: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
        with:
          source-directory: Formula
          destination-github-username: 'sglyon'
          destination-repository-name: 'homebrew-tap'
          target-branch: main
          target-directory: Formula
          commit-message: "Update jupytext to ${{ github.ref_name }}"
